<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaf's Void</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <img
      src="/media/images/Paper not Signed.jpg"
      id="paper1"
      style="
        animation: start-spin 2s ease-out;
        filter: drop-shadow(0 0 10px #fff);
      "
    />
    <img
      src="/media/images/Paper Signed.jpg"
      id="paper2"
      style="
        display: none;
        animation: signed-spin 2s ease-in-out;
        transform: rotate3d(1, 0, 0, 90deg);
      "
    />
    <button onclick="SignPaper()"></button>

    <h1 style="display: none;" id="construction">Still Under Construction :(</h1>

    <audio id="signing sfx" src="/media/soundeffects/Edding short.aac"></audio>

    <script>
      function SignPaper() {
        document.getElementById("paper1").style.display = "none";
        document.getElementById("signing sfx").play();
        document.getElementById("paper2").style.display = "";
        setTimeout(() => {
          document.getElementById("paper2").style.display = "none";
          document.getElementById("construction").style.display = "";
        }, 2000);
      }
    </script>
  </body>
</html>
